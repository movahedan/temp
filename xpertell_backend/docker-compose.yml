version: '3'

services:
  app:
    image: 545006460792.dkr.ecr.eu-central-1.amazonaws.com/xpertell_backend:production-20251201185630-99b8b334473f10aa6aa5260f522d3048d9913a2b
    container_name: xpertell-app
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      args:
        NOVA_LICENSE_KEY: '${NOVA_LICENSE_KEY}'
        NOVA_EMAIL: '${NOVA_EMAIL}'
    ports:
      - "8000:8000"
    working_dir: /var/www
    depends_on:
      - redis
      - mysql
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 5s
      timeout: 15s
      retries: 5
    volumes:
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini:ro
    networks:
      - xpertell

  nginx:
    container_name: xpertell-nginx
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:rw
      - ./docker/nginx/site.conf:/etc/nginx/sites-enabled/site.conf:ro
      - ./docker/nginx/ssl/:/etc/nginx/ssl/
    working_dir: /var/www
    depends_on:
      app:
        condition: service_healthy
    networks:
      - xpertell

  mysql:
    container_name: xpertell-mysql
    image: 'mysql:8.0'
    ports:
      - '${FORWARD_DB_PORT:-3327}:3306'
    environment:
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
    volumes:
      - 'mysql:/var/lib/mysql'
    networks:
      - xpertell
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}" ]
      retries: 3
      timeout: 5s

  redis:
    container_name: xpertell-redis
    image: 'redis'
    ports:
      - '${FORWARD_REDIS_PORT:-9736}:6379'
    volumes:
      - 'redis:/data'
    networks:
      - xpertell
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      retries: 3
      timeout: 5s

