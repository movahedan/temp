user www-data;
worker_processes  auto;

error_log  /var/log/nginx/error.log;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    fastcgi_read_timeout        600;
    proxy_connect_timeout       600;
    proxy_send_timeout          600;
    proxy_read_timeout          600;
    send_timeout                600;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 250M;
    large_client_header_buffers 4 32k;


#     upstream backend {
#         server xpertell_backend-app-1:8000;
#         server xpertell_backend-app-2:8000;
#         server xpertell_backend-app-3:8000;
#     }

    server {
        listen 80;
        listen [::]:80;

        server_name xpertell.com;
        location / {
            proxy_pass http://xpertell_landings:3000;
        }
    }

    server {
        listen 80;
        listen [::]:80;

        server_name demo.xpertell.com app.xpertell.com dash.xpertell.com localhost;
        server_tokens off;
        client_max_body_size 250M;

        location /.well-known/ {
            root /var/www/public/;
            allow all;
        }

        location /robots.txt {
            root /var/www/public;
            allow all;
            log_not_found off;
            access_log off;
        }

        location / {
            proxy_pass http://xpertell_web:3000;
        }

        location /api {
            root /var/www/public;
            client_max_body_size 250M;
            proxy_pass http://app:8000;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /telescope {
            root /var/www/public;
            client_max_body_size 250M;
            proxy_pass http://app:8000;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /vendor/telescope {
            root /var/www/public;
            client_max_body_size 250M;
            proxy_pass http://app:8000;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /vendor/nova/ {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
