version: 0.0

os: linux

files:
  - source: /
    destination: /home/ubuntu/xpertell_frontend
  - source: deployment/.frontend.env
    destination: /home/ubuntu/xpertell_frontend

hooks:
  BeforeInstall:
    - location: scripts/stop_services.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/update_services.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start_services.sh
      timeout: 300
      runas: root

